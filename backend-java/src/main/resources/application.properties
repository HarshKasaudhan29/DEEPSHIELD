# ═══════════════════════════════════════════════════════════
# Synthetic Media Detector — application.properties
# ═══════════════════════════════════════════════════════════

# ── Server ────────────────────────────────────────────────
server.port=8080
spring.application.name=synthetic-media-detector

# ── MongoDB ───────────────────────────────────────────────
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/detector}
spring.data.mongodb.database=detector

# ── ML Service URL ────────────────────────────────────────
ml.service.url=${ML_SERVICE_URL:http://localhost:8000}

# ── File Upload Limits ────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ── JWT ───────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:synthetic-media-detector-super-secret-key-2024-minimum-256-bits-required}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ── Async Thread Pool ─────────────────────────────────────
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=15
spring.task.execution.pool.queue-capacity=50
spring.task.execution.thread-name-prefix=detector-async-

# ── WebSocket ─────────────────────────────────────────────
spring.websocket.max-text-message-size=65536
spring.websocket.max-binary-message-size=209715200

# ── Actuator ──────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── Logging ───────────────────────────────────────────────
logging.level.com.detector=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ── WebClient (max in-memory buffer for large files) ──────
spring.codec.max-in-memory-size=200MB
